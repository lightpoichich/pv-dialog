<svg xmlns="http://www.w3.org/2000/svg" width="360" height="240" viewBox="0 0 360 240" fill="none">
  <rect width="360" height="240" rx="8" fill="#F8FAFC"/>
  <!-- Backdrop -->
  <rect width="360" height="240" rx="8" fill="#0F172A" opacity="0.3"/>
  <!-- Dialog panel -->
  <rect x="30" y="25" width="300" height="180" rx="12" fill="white" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.15))"/>
  <!-- Header -->
  <text x="54" y="60" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0F172A">Dialog Title</text>
  <line x1="30" y1="75" x2="330" y2="75" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Close button -->
  <text x="310" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94A3B8">×</text>
  <!-- Content lines -->
  <rect x="54" y="92" width="200" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="54" y="112" width="252" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="54" y="132" width="160" height="10" rx="5" fill="#E2E8F0"/>
  <!-- Action button -->
  <rect x="220" y="160" width="90" height="36" rx="8" fill="#3B82F6"/>
  <text x="265" y="183" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="white">OK</text>
  <text x="180" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#CBD5E1">PV Dialog</text>
</svg>
